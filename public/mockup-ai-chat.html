<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI chat mockup — bottom-right dock</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0a0b0f;
    --bg-grid: radial-gradient(circle at 18% 20%, rgba(11, 131, 201, 0.18), transparent 30%),
               radial-gradient(circle at 82% 22%, rgba(228, 35, 48, 0.12), transparent 32%),
               #0e1015;
    --shell: #161821;
    --shell-border: rgba(255, 255, 255, 0.06);
    --accent: #5e9bff;
    --text: #e6e8ee;
    --muted: #8a8f9b;
    --surface: rgba(22, 24, 33, 0.96);
    --surface-strong: #1a1c25;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --shadow: 0 18px 60px rgba(0, 0, 0, 0.6), 0 2px 0 rgba(255, 255, 255, 0.02) inset;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg-grid);
    background-color: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: relative;
    width: min(1320px, calc(100vw - 64px));
    height: min(720px, calc(100vh - 64px));
    margin: 32px auto;
    border-radius: 14px;
    background: var(--shell);
    border: 1px solid var(--shell-border);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.45);
    overflow: hidden;
  }
  .topbar {
    height: 48px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border-bottom: 1px solid var(--shell-border);
    color: var(--muted);
    font-size: 12px;
  }
  .topbar .dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2d38; }
  .topbar .title { color: var(--text); font-weight: 700; }
  .topbar .crumbs { color: var(--muted); }
  .topbar .crumbs b { color: rgba(255,255,255,0.4); margin: 0 6px; font-weight: 400; }

  .body {
    display: grid;
    grid-template-columns: 56px 1fr;
    height: calc(100% - 48px);
  }
  .rail {
    border-right: 1px solid var(--shell-border);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .rail .nav {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
  }
  .rail .nav.active {
    background: rgba(94,155,255,0.12);
    border-color: rgba(94,155,255,0.32);
  }

  .content {
    position: relative;
    padding: 28px 32px;
    overflow: hidden;
  }
  .content h1 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 700;
  }
  .content .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 22px;
  }
  .panel {
    border-radius: 10px;
    border: 1px solid var(--shell-border);
    background: rgba(255,255,255,0.02);
    height: 320px;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .panel-row {
    height: 36px;
    margin: 8px 0;
    border-radius: 6px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    display: grid;
    grid-template-columns: 32px 1fr 80px 80px;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
  }
  .panel-row .swatch { width: 18px; height: 18px; border-radius: 4px; background: rgba(255,255,255,0.06); }
  .panel-row .text { height: 8px; border-radius: 99px; background: rgba(255,255,255,0.06); }
  .panel-row .meta { height: 8px; border-radius: 99px; background: rgba(255,255,255,0.04); }
  .panel-row.spotlight {
    background: rgba(94,155,255,0.06);
    border: 1px solid rgba(94,155,255,0.5);
    box-shadow: 0 0 0 4px rgba(94,155,255,0.12);
  }

  /* ─────────────────────────────────────────────────────────
     AI Chat Dock — bottom-right
     ───────────────────────────────────────────────────────── */
  .ai-dock {
    position: absolute;
    right: 18px;
    bottom: 14px;
    z-index: 5;
    width: 340px;
    display: grid;
    gap: 8px;
  }

  .ai-toast {
    background: var(--surface);
    backdrop-filter: blur(14px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: dockIn 320ms cubic-bezier(0.18, 0.84, 0.28, 1) both;
  }

  @keyframes dockIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ai-toast-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .ai-toast-head .avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg, #f5b93f, #ffd87a, #f5b93f 60%, transparent 60%),
      radial-gradient(circle at center, #ffd87a 0 30%, transparent 31%);
    box-shadow: 0 0 0 2px rgba(245,185,63,0.15);
  }
  .ai-toast-head .label {
    flex: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .ai-toast-head .label strong {
    font-size: 12px;
    font-weight: 700;
  }
  .ai-toast-head .label small {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }
  .ai-toast-head .actions { display: flex; gap: 4px; }
  .ai-toast-head .icon-btn {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    border-radius: 6px;
    color: var(--muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    font-size: 12px;
  }
  .ai-toast-head .icon-btn:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }

  .ai-toast-step {
    padding: 4px 12px 0;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .ai-toast-message {
    padding: 6px 14px 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .ai-toast-cta {
    display: flex;
    gap: 8px;
    padding: 0 12px 12px;
  }
  .ai-toast-cta .primary,
  .ai-toast-cta .ghost {
    height: 30px;
    padding: 0 12px;
    border-radius: 7px;
    border: 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .ai-toast-cta .primary {
    background: var(--accent);
    color: #0a1228;
  }
  .ai-toast-cta .primary:hover { filter: brightness(1.05); }
  .ai-toast-cta .ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-strong);
  }
  .ai-toast-cta .ghost:hover { color: var(--text); }

  .ai-toast-input {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 8px 10px 8px 12px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.18);
  }
  .ai-toast-input input {
    background: transparent;
    border: 0;
    color: var(--text);
    font-size: 12px;
    padding: 4px 0;
    outline: none;
  }
  .ai-toast-input input::placeholder { color: var(--muted); }
  .ai-toast-input .send {
    width: 24px; height: 24px;
    display: grid; place-items: center;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    border: 0; cursor: pointer;
    font-size: 12px;
  }

  /* Launcher tab — always visible, sits at the very bottom */
  .ai-launcher {
    height: 30px;
    padding: 0 10px 0 8px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 8px;
    background: rgba(22, 24, 33, 0.9);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    color: var(--text);
    font-size: 11px;
    font-weight: 700;
    width: fit-content;
    justify-self: end;
    cursor: pointer;
  }
  .ai-launcher .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(94,155,255,0.55);
    animation: pulseRing 1.6s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%, 100% { box-shadow: 0 0 0 0 rgba(94,155,255,0.55); }
    50% { box-shadow: 0 0 0 6px rgba(94,155,255,0); }
  }
  .ai-launcher kbd {
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
  }

  /* compact mode toggle */
  .stage[data-state="closed"] .ai-toast { display: none; }

  .controls {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 50;
  }
  .controls button {
    height: 28px;
    padding: 0 12px;
    border-radius: 7px;
    background: rgba(20,22,30,0.92);
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
  }
  .controls button.on { color: var(--text); border-color: var(--border-strong); background: rgba(40,44,56,0.92); }
</style>
</head>
<body>
  <div class="controls">
    <button id="state-open" class="on">Toast open</button>
    <button id="state-closed">Launcher only</button>
  </div>

  <div class="stage" data-state="open" id="stage">
    <header class="topbar">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="title">Skills Workflow</div>
      <div class="crumbs">Coca-Cola <b>/</b> Summer Assets <b>/</b> Budget</div>
    </header>
    <div class="body">
      <aside class="rail">
        <div class="nav"></div>
        <div class="nav"></div>
        <div class="nav active"></div>
        <div class="nav"></div>
        <div class="nav"></div>
        <div class="nav"></div>
      </aside>
      <div class="content">
        <h1>Budget</h1>
        <div class="sub">Coca-Cola — Summer Assets · €15,000</div>

        <div>
          <div class="panel-row">
            <div class="swatch"></div>
            <div class="text" style="width:62%"></div>
            <div class="meta"></div>
            <div class="meta" style="background:rgba(94,155,255,0.4)"></div>
          </div>
          <div class="panel-row">
            <div class="swatch"></div>
            <div class="text" style="width:48%"></div>
            <div class="meta"></div>
            <div class="meta" style="background:rgba(94,155,255,0.4)"></div>
          </div>
          <div class="panel-row spotlight">
            <div class="swatch"></div>
            <div class="text" style="width:55%"></div>
            <div class="meta"></div>
            <div class="meta" style="background:rgba(94,155,255,0.4)"></div>
          </div>
          <div class="panel-row">
            <div class="swatch"></div>
            <div class="text" style="width:40%"></div>
            <div class="meta"></div>
            <div class="meta" style="background:rgba(94,155,255,0.4)"></div>
          </div>
        </div>

        <!-- AI dock pinned bottom-right of the stage -->
        <div class="ai-dock">
          <div class="ai-toast">
            <div class="ai-toast-head">
              <span class="avatar"></span>
              <div class="label">
                <strong>Skills AI</strong>
                <small>Step 3 of 12 · Budget</small>
              </div>
              <div class="actions">
                <button class="icon-btn" title="Maximise">⤢</button>
                <button class="icon-btn" title="Minimise">▾</button>
              </div>
            </div>
            <div class="ai-toast-step">Send for client approval</div>
            <div class="ai-toast-message">
              I've reviewed the deliverables and resources.
              The estimate is ready — let's send it for client approval.
            </div>
            <div class="ai-toast-cta">
              <button class="primary">✓ Send to client approval</button>
              <button class="ghost">Skip</button>
            </div>
            <div class="ai-toast-input">
              <input placeholder="Ask the agent…" />
              <button class="send" title="Send">↑</button>
            </div>
          </div>

          <div class="ai-launcher" title="Open Skills AI">
            <span class="pulse"></span>
            <span>Skills AI</span>
            <kbd>⌘K</kbd>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const stage = document.getElementById('stage');
  document.getElementById('state-open').addEventListener('click', () => {
    stage.dataset.state = 'open';
    document.getElementById('state-open').classList.add('on');
    document.getElementById('state-closed').classList.remove('on');
  });
  document.getElementById('state-closed').addEventListener('click', () => {
    stage.dataset.state = 'closed';
    document.getElementById('state-open').classList.remove('on');
    document.getElementById('state-closed').classList.add('on');
  });
</script>
</body>
</html>
